<!DOCTYPE html>
<html lang="es">
  <head>

      }

      }
      .fotos-trabajo {

        flex-wrap: wrap;
        margin-top: 15px;
        justify-content: center;
      }
      .nav-tabs .nav-link {
        color: #7f8c8d;
        font-weight: 500;

        border-bottom: 2px solid transparent;

        font-weight: 600;

      }

        color: #3498db;

      .delete-btn {
        transition: all 0.3s ease;
      }
      .delete-btn:hover {
        transform: scale(1.1);
      }
      #btnMostrarResumen {
        transition: all 0.3s ease;
        background-color: #3498db;
        border: none;
      }
      #btnMostrarResumen:hover {
        background-color: #2980b9;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
      }
      .action-btn {
        margin-right: 10px;

        transition: all 0.3s ease;
      }

        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      @media (max-width: 576px) {

      }
      .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);

                </button>
              </div>
            </div>
            <div class="mb-3">
              <label for="descripcionTrabajo" class="form-label"

                <span class="input-group-text"

            <div class="mb-3">

                <span class="input-group-text"
                  ><i class="fas fa-map-marker-alt"></i
                ></span>
                <input
                  type="text"
                  class="form-control"
                  id="ubicacionTrabajo"
                  required
                />
                <button
                  type="button"
                  class="btn btn-voice"
                  onclick="iniciarReconocimientoVoz('ubicacionTrabajo')"
                  title="iniciarReconocimientoVoz('ubicacionTrabajo')"
                >
                  <i class="fas fa-microphone"></i>
                </button>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="fechaInicioTrabajo" class="form-label"

                <div class="input-group">
                  <span class="input-group-text"

                  <input
                    type="date"

                    id="fechaInicioTrabajo"

              <div class="col-md-6 mb-3">

                >
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="fas fa-calendar-check"></i
                  ></span>
                  <input
                    type="date"
                    class="form-control"
                    id="fechaFinTrabajo"
                  />
                </div>
              </div>
            </div>
            <div class="mb-3">
              <label for="materialesTrabajo" class="form-label"
                >Materiales utilizados</label
              >
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-tools"></i
                ></span>
                <input
                  type="text"
                  class="form-control"
                  id="materialesTrabajo"
                  placeholder="Separados por comas"
                />
                <button
                  type="button"
                  class="btn btn-voice"
                  onclick="iniciarReconocimientoVoz('materialesTrabajo')"
                  title="iniciarReconocimientoVoz('materialesTrabajo')"
                >
                  <i class="fas fa-microphone"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label for="nombreTrabajador" class="form-label"
                >Trabajador y Horas</label
              >
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-user-clock"></i
                ></span>
                <input
                  type="text"
                  class="form-control"
                  id="nombreTrabajador"
                  placeholder="Nombre del trabajador"
                />
                <input
                  type="number"
                  class="form-control"
                  id="horasTrabajadas"
                  placeholder="Horas trabajadas"
                />
                <button
                  type="button"
                  class="btn btn-primary"

            </div>
            <div class="mb-3">

            </div>
            <div class="mb-3">

                <span class="input-group-text"
                  ><i class="fas fa-briefcase"></i
                ></span>
                <input
                  type="number"
                  class="form-control"
                  id="experienciaTrabajador"
                  required
                />
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="fas fa-user-plus"></i> Registrar Trabajador

          </form>
          <div id="listaTrabajadoresRegistrados" class="mt-4"></div>

        <div

            <button

            </button>
            <button
              class="btn btn-secondary action-btn"
              onclick="compartirResumen()"

              <i class="fas fa-share-alt"></i> Compartir
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script>
      // Corrección del código JavaScript
      // Lógica para el reconocimiento de voz
      function iniciarReconocimientoVoz(elementId) {
        // Verifica si el navegador soporta la API
        if (!("webkitSpeechRecognition" in window)) {
          alert(
            "Tu navegador no soporta el reconocimiento de voz. Por favor, usa Google Chrome."
          );
          return;
        }

        // Crear una instancia de SpeechRecognition
        const recognition = new webkitSpeechRecognition();
        recognition.lang = "es-ES"; // Idioma español
        recognition.interimResults = false; // No queremos resultados intermedios
        recognition.maxAlternatives = 1; // Solo una alternativa

        // Al iniciar el reconocimiento
        recognition.onstart = function () {
          console.log("Reconocimiento de voz iniciado. Habla ahora.");
        };

        // Cuando se deja de hablar
        recognition.onspeechend = function () {
          recognition.stop();
          console.log("Fin de la entrada de voz.");
        };

        // Al obtener un resultado del reconocimiento
        recognition.onresult = function (event) {
          const resultado = event.results[0][0].transcript;
          document.getElementById(elementId).value = resultado;
        };

        // Manejo de errores
        recognition.onerror = function (event) {
          console.error("Error en el reconocimiento de voz:", event.error);
        };

        // Iniciar reconocimiento
        recognition.start();
      }
    </script>

    <!-- Script de Firebase para registrar trabajos -->
    <script type="module">
      // Importa las funciones que necesitas de los SDKs que necesitas
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
      } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-analytics.js";

      // Configuración de tu aplicación Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyBJuUndhHEHdxRJmW89CDe0pfx76fFt0GM",
        authDomain: "worktracker-pro-a52d2.firebaseapp.com",
        projectId: "worktracker-pro-a52d2",
        storageBucket: "worktracker-pro-a52d2.appspot.com",
        messagingSenderId: "875903002791",
        appId: "1:875903002791:web:a38dab83f0cd7ec0a19382",
        measurementId: "G-3TJG2QXWYS",
      };

      // Inicializa Firebase y Firestore
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const analytics = getAnalytics(app);

      // Lógica para agregar trabajos a Firestore
      document
        .getElementById("trabajoForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault(); // Evita que la página se recargue

          const nombreTrabajo = document.getElementById("nombreTrabajo").value;
          const descripcionTrabajo =
            document.getElementById("descripcionTrabajo").value;
          const ubicacionTrabajo =
            document.getElementById("ubicacionTrabajo").value;
          const fechaInicioTrabajo =
            document.getElementById("fechaInicioTrabajo").value;
          const fechaFinTrabajo =
            document.getElementById("fechaFinTrabajo").value;

          try {
            await addDoc(collection(db, "trabajos"), {
              nombre: nombreTrabajo,
              descripcion: descripcionTrabajo,
              ubicacion: ubicacionTrabajo,
              fechaInicio: fechaInicioTrabajo,
              fechaFin: fechaFinTrabajo,
            });
            alert("Trabajo registrado exitosamente.");
            // Opcional: limpiar el formulario después de enviar los datos
            e.target.reset();
          } catch (error) {
            console.error("Error al agregar el documento: ", error);
            alert("Error al registrar el trabajo.");
          }
        });
    </script>
  </body>
